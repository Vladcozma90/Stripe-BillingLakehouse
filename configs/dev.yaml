catalog: dev_commerce

project: billinglakehouse

paths:
  landing_base_path: "abfss://source@databricksendtoendtest.dfs.core.windows.net"
  raw_base_path: "abfss://raw@databricksendtoendtest.dfs.core.windows.net"
  curated_base_path: "abfss://curated@databricksendtoendtest.dfs.core.windows.net"
  ops_base_path: "abfss://ops@databricksendtoendtest.dfs.core.windows.net"
  checkpoint_base_path: "abfss://checkpoint@databricksendtoendtest.dfs.core.windows.net"


api_sources:
  stripe:
    base_url: "https://api.stripe.com/v1"
    datasets:
      stripe_customers:
        endpoint: "customers"
      stripe_subscriptions:
        endpoint: "subscriptions"
      stripe_invoices:
        endpoint: "invoices"


datasets:
  dim_plan:
    landing_format: parquet
    data_quality:
      rules:
        plan_id:
          max_null: 0.0
        monthly_price_usd:
          max_null: 0.0
        seats_included:
          max_null: 0.0
  dim_accounts:
    landing_format: parquet
    data_quality:
      rules:
        account_id:
          max_null: 0.0
        stripe_customer_id:
          max_null: 0.0
        plan_id:
          max_null: 0.0
  fact_usage_daily:
    landing_format: parquet
    data_quality:
      rules:
        account_id:
          max_null: 0.0
        active_users:
          max_null: 0.0
  stripe_customers:
    landing_format: json
  stripe_subscriptions:
    landing_format: json
  stripe_invoices:
    landing_format: json